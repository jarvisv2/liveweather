name: Automated Weather Alert

on:
  schedule:
    # This cron runs every 4 hours. 
    # Note: GitHub Actions uses UTC time. 
    - cron: '0 */4 * * *'
  workflow_dispatch: # This allows you to run it manually from GitHub by clicking a button

jobs:
  check-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Native fetch is supported in Node 18+

      - name: Run Weather Script
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node index.js
